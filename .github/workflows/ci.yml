name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Verify gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt'd:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Install ast-grep
        run: |
          set -e
          curl -fsSL https://github.com/ast-grep/ast-grep/releases/latest/download/app-x86_64-unknown-linux-gnu.zip -o /tmp/ast-grep.zip
          unzip -o /tmp/ast-grep.zip -d /tmp/ast-grep-bin
          # Archive may contain the binary as 'ast-grep' or 'sg'; install whichever we find.
          if [ -f /tmp/ast-grep-bin/ast-grep ]; then
            sudo install -m 755 /tmp/ast-grep-bin/ast-grep /usr/local/bin/ast-grep
          elif [ -f /tmp/ast-grep-bin/sg ]; then
            sudo install -m 755 /tmp/ast-grep-bin/sg /usr/local/bin/ast-grep
          else
            echo "ast-grep binary not found in release archive; contents:"
            ls -la /tmp/ast-grep-bin
            exit 1
          fi
          ast-grep --version

      - name: Unit tests with race detector
        run: go test -race $(go list ./... | grep -v /tests/)

      - name: Build
        run: go build -o bin/forge ./cmd/forge/
